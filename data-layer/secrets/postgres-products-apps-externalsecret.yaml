---
# ExternalSecret: product-catalog-secrets in shopping-cart-apps
# product-catalog mounts this via envFrom secretRef — all keys become env vars
# Keys required: DATABASE_USER, DATABASE_PASSWORD, RABBITMQ_USER, RABBITMQ_PASSWORD
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: product-catalog-secrets
  namespace: shopping-cart-apps
  labels:
    app.kubernetes.io/name: external-secret
    app.kubernetes.io/instance: product-catalog-secrets
    app.kubernetes.io/component: database-credentials
    app.kubernetes.io/part-of: shopping-cart
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: product-catalog-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: external-secret
          app.kubernetes.io/instance: product-catalog-secrets
          app.kubernetes.io/component: database-credentials
          app.kubernetes.io/part-of: shopping-cart
      data:
        DATABASE_USER: "{{ .username }}"
        DATABASE_PASSWORD: "{{ .password }}"
        RABBITMQ_USER: "guest"
        RABBITMQ_PASSWORD: "guest"
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/postgres/products
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/postgres/products
        property: password
