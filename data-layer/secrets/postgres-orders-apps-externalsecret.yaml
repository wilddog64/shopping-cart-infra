---
# ExternalSecret: order-service-secrets in shopping-cart-apps
# order-service mounts this via envFrom secretRef — all keys become env vars
# Keys required: DB_USERNAME, DB_PASSWORD, RABBITMQ_USERNAME, RABBITMQ_PASSWORD
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: order-service-secrets
  namespace: shopping-cart-apps
  labels:
    app.kubernetes.io/name: external-secret
    app.kubernetes.io/instance: order-service-secrets
    app.kubernetes.io/component: database-credentials
    app.kubernetes.io/part-of: shopping-cart
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: order-service-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        DB_USERNAME: "{{ .username }}"
        DB_PASSWORD: "{{ .password }}"
        RABBITMQ_USERNAME: "guest"
        RABBITMQ_PASSWORD: "guest"
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/postgres/orders
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/postgres/orders
        property: password
