---
# ExternalSecret: order-service-secrets in shopping-cart-apps
# order-service mounts this via envFrom secretRef — all keys become env vars
# Keys required: DB_USERNAME, DB_PASSWORD, RABBITMQ_USERNAME, RABBITMQ_PASSWORD,
#                SPRING_RABBITMQ_USERNAME, SPRING_RABBITMQ_PASSWORD
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: order-service-secrets
  namespace: shopping-cart-apps
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: external-secret
    app.kubernetes.io/instance: order-service-secrets
    app.kubernetes.io/component: database-credentials
    app.kubernetes.io/part-of: shopping-cart
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: order-service-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: external-secret
          app.kubernetes.io/instance: order-service-secrets
          app.kubernetes.io/component: database-credentials
          app.kubernetes.io/part-of: shopping-cart
      data:
        DB_USERNAME: "{{ .username }}"
        DB_PASSWORD: "{{ .password }}"
        RABBITMQ_USERNAME: "{{ .rabbitmq_username }}"
        RABBITMQ_PASSWORD: "{{ .rabbitmq_password }}"
        SPRING_RABBITMQ_USERNAME: "{{ .rabbitmq_username }}"
        SPRING_RABBITMQ_PASSWORD: "{{ .rabbitmq_password }}"
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/postgres/orders
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/postgres/orders
        property: password
    - secretKey: rabbitmq_username
      remoteRef:
        key: secret/data/rabbitmq/default
        property: username
    - secretKey: rabbitmq_password
      remoteRef:
        key: secret/data/rabbitmq/default
        property: password
