---
# Service: vault-bridge
#
# Provides a stable cluster-internal DNS name for the socat bridge on the k3s server node.
# The socat bridge forwards 0.0.0.0:8201 → localhost:8200 on the EC2 server, making
# the reverse SSH tunnel reachable from pods without exposing localhost directly.
#
# Endpoints are created imperatively by k3d-manager bin/acg-up (dynamic node IP changes per
# sandbox). bin/acg-up is in the wilddog64/k3d-manager repo, not in this repo.
# This Service provides the stable DNS name: vault-bridge.secrets.svc.cluster.local:8201
#
# NOTE: The `secrets` namespace is created by k3d-manager (bin/acg-up Step 6) on each cluster
# provision. It is NOT managed by ArgoCD or this repo. Apply this manifest only after
# k3d-manager has provisioned the cluster.
apiVersion: v1
kind: Service
metadata:
  name: vault-bridge
  namespace: secrets
spec:
  ports:
  - port: 8201
    protocol: TCP
    targetPort: 8201
  # No selector — Endpoints managed imperatively by bin/acg-up with the current node IP
