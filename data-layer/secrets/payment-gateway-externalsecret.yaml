---
# ExternalSecret for Payment Gateway credentials (Stripe, PayPal)
# Syncs static secrets from Vault KV to Kubernetes Secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: payment-gateway-secrets
  namespace: shopping-cart-payment
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: external-secret
    app.kubernetes.io/instance: payment-gateway
    app.kubernetes.io/component: gateway-credentials
    app.kubernetes.io/part-of: shopping-cart
    pci-scope: "true"
spec:
  # Check for updates daily
  refreshInterval: 24h

  # Reference to the SecretStore
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore

  # Target Kubernetes Secret to create/update
  target:
    name: payment-gateway-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: payment-gateway-credentials
          app.kubernetes.io/component: gateway-credentials
          pci-scope: "true"
      data:
        stripe-api-key: "{{ .stripe_api_key }}"
        stripe-webhook-secret: "{{ .stripe_webhook_secret }}"
        paypal-client-id: "{{ .paypal_client_id }}"
        paypal-client-secret: "{{ .paypal_client_secret }}"

  # Data to fetch from Vault KV
  data:
    - secretKey: stripe_api_key
      remoteRef:
        key: secret/data/payment/stripe
        property: api_key
    - secretKey: stripe_webhook_secret
      remoteRef:
        key: secret/data/payment/stripe
        property: webhook_secret
    - secretKey: paypal_client_id
      remoteRef:
        key: secret/data/payment/paypal
        property: client_id
    - secretKey: paypal_client_secret
      remoteRef:
        key: secret/data/payment/paypal
        property: client_secret
