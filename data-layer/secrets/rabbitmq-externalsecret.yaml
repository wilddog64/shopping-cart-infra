---
# ExternalSecret: RabbitMQ default credentials for the broker StatefulSet
# Syncs username + password from Vault KV into
# shopping-cart-data/rabbitmq-credentials
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rabbitmq-credentials
  namespace: shopping-cart-data
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: external-secret
    app.kubernetes.io/instance: rabbitmq-credentials
    app.kubernetes.io/component: message-queue-credentials
    app.kubernetes.io/part-of: shopping-cart
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: rabbitmq-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: rabbitmq
          app.kubernetes.io/instance: rabbitmq-credentials
          app.kubernetes.io/component: message-queue-credentials
          app.kubernetes.io/part-of: shopping-cart
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/rabbitmq/default
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/rabbitmq/default
        property: password
