---
# ExternalSecret for Payment Encryption Key
# AES-256-GCM encryption key for PCI DSS data protection
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: payment-encryption-secret
  namespace: shopping-cart-payment
  labels:
    app.kubernetes.io/name: external-secret
    app.kubernetes.io/instance: payment-encryption
    app.kubernetes.io/component: encryption-key
    app.kubernetes.io/part-of: shopping-cart
    pci-scope: "true"
spec:
  # Check for key rotation daily
  refreshInterval: 24h

  # Reference to the SecretStore
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore

  # Target Kubernetes Secret to create/update
  target:
    name: payment-encryption-secret
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: encryption-key
          app.kubernetes.io/component: encryption-key
          pci-scope: "true"
      data:
        # Base64-encoded AES-256 key (32 bytes)
        encryption-key: "{{ .encryption_key }}"

  # Data to fetch from Vault KV
  data:
    - secretKey: encryption_key
      remoteRef:
        key: secret/data/payment/encryption
        property: key
