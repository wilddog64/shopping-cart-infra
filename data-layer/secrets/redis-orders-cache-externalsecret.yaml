---
# ExternalSecret for Redis orders-cache instance
# Syncs password from Vault KV to Kubernetes Secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: redis-orders-cache
  namespace: shopping-cart-data
  labels:
    app.kubernetes.io/name: external-secret
    app.kubernetes.io/instance: redis-orders-cache
    app.kubernetes.io/component: cache-credentials
    app.kubernetes.io/part-of: shopping-cart
spec:
  refreshInterval: 24h

  secretStoreRef:
    name: vault-backend
    kind: SecretStore

  target:
    name: redis-orders-cache-secret
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: redis
          app.kubernetes.io/instance: orders-cache
          app.kubernetes.io/component: cache-credentials
      data:
        password: "{{ .password }}"
        host: "redis-orders-cache.shopping-cart-data.svc.cluster.local"
        port: "6379"
        connection-string: "redis://:{{ .password }}@redis-orders-cache.shopping-cart-data.svc.cluster.local:6379/0"

  data:
    - secretKey: password
      remoteRef:
        key: secret/data/redis/orders-cache
        property: password
