---
# ClusterSecretStore: vault-backend
#
# Connects ESO on the remote app cluster (ubuntu-k3s) to the local Vault instance
# via the reverse SSH tunnel (-R 8200:localhost:8200 in autossh plist).
#
# Vault is reachable at http://localhost:8200 on the EC2 server because the autossh
# tunnel maps Mac:8200 → EC2:localhost:8200.
#
# Prerequisites on ubuntu-k3s (applied once after each cluster provision):
#   kubectl --context ubuntu-k3s create secret generic vault-token \
#     -n secrets --from-literal=token=<vault-root-or-policy-token> \
#     --dry-run=client -o yaml | kubectl --context ubuntu-k3s apply -f -
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "http://localhost:8200"
      path: "secret"
      version: "v2"
      auth:
        tokenSecretRef:
          name: vault-token
          namespace: secrets
          key: token
