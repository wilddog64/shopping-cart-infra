---
# ClusterSecretStore: vault-backend
#
# Connects ESO on the remote app cluster (ubuntu-k3s) to the local Vault instance
# via the reverse SSH tunnel (-R 8200:localhost:8200 in autossh plist).
#
# Vault is reachable at http://localhost:8200 on the EC2 server because the autossh
# tunnel maps Mac:8200 → EC2:localhost:8200.
#
# NOTE: The `secrets` namespace is created by k3d-manager (bin/acg-up) on each cluster
# provision. It is NOT managed by ArgoCD or this repo. The vault-token Secret and vault-bridge
# Service in `secrets` ns are also applied by k3d-manager, not by ArgoCD sync.
#
# Prerequisites on ubuntu-k3s (applied once after each cluster provision by k3d-manager):
#   kubectl --context ubuntu-k3s create secret generic vault-token \
#     -n secrets --from-literal=token=<vault-root-or-policy-token> \
#     --dry-run=client -o yaml | kubectl --context ubuntu-k3s apply -f -
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "http://vault-bridge.secrets.svc.cluster.local:8201"
      path: "secret"
      version: "v2"
      auth:
        tokenSecretRef:
          name: vault-token
          namespace: secrets
          key: token
