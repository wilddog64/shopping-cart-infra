---
# ExternalSecret: redis-orders-cache password synced into shopping-cart-apps
# order-service expects this secret via redis-orders-cache-secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: redis-orders-cache-apps
  namespace: shopping-cart-apps
  labels:
    app.kubernetes.io/name: external-secret
    app.kubernetes.io/instance: redis-orders-cache-apps
    app.kubernetes.io/component: cache-credentials
    app.kubernetes.io/part-of: shopping-cart
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: redis-orders-cache-secret
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: secret/data/redis/orders-cache
        property: password
