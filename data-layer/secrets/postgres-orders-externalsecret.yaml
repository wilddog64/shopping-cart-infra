---
# ExternalSecret for PostgreSQL orders database
# Syncs dynamic database credentials from Vault to Kubernetes Secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-orders-readwrite
  namespace: shopping-cart-data
  labels:
    app.kubernetes.io/name: external-secret
    app.kubernetes.io/instance: postgres-orders-readwrite
    app.kubernetes.io/component: database-credentials
    app.kubernetes.io/part-of: shopping-cart
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: vault-backend
    kind: SecretStore

  target:
    name: postgres-orders-readwrite
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: postgres-credentials
          app.kubernetes.io/instance: orders-readwrite
          app.kubernetes.io/component: database-credentials
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
        database: "orders"
        host: "postgresql-orders.shopping-cart-data.svc.cluster.local"
        port: "5432"
        connection-string: "postgresql://{{ .username }}:{{ .password }}@postgresql-orders.shopping-cart-data.svc.cluster.local:5432/orders"

  data:
    - secretKey: username
      remoteRef:
        key: database/creds/orders-readwrite
        property: username
    - secretKey: password
      remoteRef:
        key: database/creds/orders-readwrite
        property: password
