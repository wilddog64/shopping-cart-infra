---
# ExternalSecret for PostgreSQL orders database
# Syncs static database credentials from Vault KV
# (secret/data/postgres/orders)
# ACG sandbox: credentials are static — no dynamic DB engine configured
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-orders-readwrite
  namespace: shopping-cart-data
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: external-secret
    app.kubernetes.io/instance: postgres-orders-readwrite
    app.kubernetes.io/component: database-credentials
    app.kubernetes.io/part-of: shopping-cart
spec:
  # Static KV credentials do not expire; 24h is sufficient
  refreshInterval: 24h

  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore

  target:
    name: postgres-orders-readwrite
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: postgres-credentials
          app.kubernetes.io/instance: orders-readwrite
          app.kubernetes.io/component: database-credentials
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
        database: "orders"
        host: "postgresql-orders.shopping-cart-data.svc.cluster.local"
        port: "5432"
        connection-string: "postgresql://{{ .username }}:{{ .password }}@\
          postgresql-orders.shopping-cart-data.svc.cluster.local:5432/orders"

  data:
    - secretKey: username
      remoteRef:
        key: secret/data/postgres/orders
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/postgres/orders
        property: password
