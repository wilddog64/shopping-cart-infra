---
# ExternalSecret for Redis cart instance
# Syncs password from Vault KV to Kubernetes Secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: redis-cart
  namespace: shopping-cart-data
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: external-secret
    app.kubernetes.io/instance: redis-cart
    app.kubernetes.io/component: cache-credentials
    app.kubernetes.io/part-of: shopping-cart
spec:
  # Refresh password daily (static secret)
  refreshInterval: 24h

  # Reference to the SecretStore (created by ESO deployment)
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore

  # Target Kubernetes Secret to create/update
  target:
    name: redis-cart-secret
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: redis
          app.kubernetes.io/instance: cart
          app.kubernetes.io/component: cache-credentials
      data:
        # Redis password
        password: "{{ .password }}"
        # Connection details for applications
        host: "redis-cart.shopping-cart-data.svc.cluster.local"
        port: "6379"
        # Redis connection string
        connection-string: "redis://:{{ .password }}@redis-cart.shopping-cart-data.svc.cluster.local:6379/0"

  # Data to fetch from Vault KV
  data:
    - secretKey: password
      remoteRef:
        key: secret/data/redis/cart
        property: password
