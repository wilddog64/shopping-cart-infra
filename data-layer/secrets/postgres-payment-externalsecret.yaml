---
# ExternalSecret for PostgreSQL payment database
# Syncs static database credentials from Vault KV
# (secret/data/postgres/payment)
# ACG sandbox: credentials are static — no dynamic DB engine configured
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-payment-app
  namespace: shopping-cart-payment
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: external-secret
    app.kubernetes.io/instance: postgres-payment-app
    app.kubernetes.io/component: database-credentials
    app.kubernetes.io/part-of: shopping-cart
    pci-scope: "true"
spec:
  # Static KV credentials do not expire; 24h is sufficient
  refreshInterval: 24h

  # Reference to the ClusterSecretStore
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore

  # Target Kubernetes Secret to create/update (static creds — no TTL rotation)
  target:
    name: payment-db-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: postgres-credentials
          app.kubernetes.io/instance: payment
          app.kubernetes.io/component: database-credentials
          pci-scope: "true"
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
        database: "payments"
        host: "postgresql-payment.shopping-cart-data.svc.cluster.local"
        port: "5432"
        connection-string: "postgresql://{{ .username }}:{{ .password }}@postgresql-payment.shopping-cart-data.svc.cluster.local:5432/payments"

  # Data fetched from static Vault KV (secret/data/postgres/payment)
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/postgres/payment
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/postgres/payment
        property: password
