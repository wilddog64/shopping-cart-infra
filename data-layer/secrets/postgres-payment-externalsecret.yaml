---
# ExternalSecret for PostgreSQL payment database
# Syncs dynamic database credentials from Vault to Kubernetes Secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-payment-app
  namespace: shopping-cart-payment
  labels:
    app.kubernetes.io/name: external-secret
    app.kubernetes.io/instance: postgres-payment-app
    app.kubernetes.io/component: database-credentials
    app.kubernetes.io/part-of: shopping-cart
    pci-scope: "true"
spec:
  # Refresh credentials every hour (before they expire)
  refreshInterval: 1h

  # Reference to the SecretStore
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore

  # Target Kubernetes Secret to create/update
  target:
    name: payment-db-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: postgres-credentials
          app.kubernetes.io/instance: payment
          app.kubernetes.io/component: database-credentials
          pci-scope: "true"
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
        database: "payments"
        host: "postgresql-payment.shopping-cart-data.svc.cluster.local"
        port: "5432"
        connection-string: "postgresql://{{ .username }}:{{ .password }}@postgresql-payment.shopping-cart-data.svc.cluster.local:5432/payments"

  # Data to fetch from Vault
  data:
    - secretKey: username
      remoteRef:
        key: database/creds/payment-readwrite
        property: username
    - secretKey: password
      remoteRef:
        key: database/creds/payment-readwrite
        property: password
