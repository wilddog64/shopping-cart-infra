---
# ExternalSecret for PostgreSQL products database
# Syncs dynamic database credentials from Vault to Kubernetes Secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-products-app
  namespace: shopping-cart-data
  labels:
    app.kubernetes.io/name: external-secret
    app.kubernetes.io/instance: postgres-products-app
    app.kubernetes.io/component: database-credentials
    app.kubernetes.io/part-of: shopping-cart
spec:
  # Refresh credentials every hour (before they expire)
  refreshInterval: 1h

  # Reference to the SecretStore (created by ESO deployment)
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore

  # Target Kubernetes Secret to create/update
  target:
    name: postgres-products-app
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: postgres-credentials
          app.kubernetes.io/instance: products
          app.kubernetes.io/component: database-credentials
      data:
        # Database connection details
        username: "{{ .username }}"
        password: "{{ .password }}"
        database: "products"
        host: "postgresql-products.shopping-cart-data.svc.cluster.local"
        port: "5432"
        # Connection string for applications
        connection-string: "postgresql://{{ .username }}:{{ .password }}@postgresql-products.shopping-cart-data.svc.cluster.local:5432/products"

  # Data to fetch from Vault
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/postgres/products
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/postgres/products
        property: password

---
# ExternalSecret for read-write access (for product-catalog service)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-products-readwrite
  namespace: shopping-cart-data
  labels:
    app.kubernetes.io/name: external-secret
    app.kubernetes.io/instance: postgres-products-readwrite
    app.kubernetes.io/component: database-credentials
    app.kubernetes.io/part-of: shopping-cart
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore

  target:
    name: postgres-products-readwrite
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: postgres-credentials
          app.kubernetes.io/instance: products-readwrite
          app.kubernetes.io/component: database-credentials
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
        database: "products"
        host: "postgresql-products.shopping-cart-data.svc.cluster.local"
        port: "5432"
        connection-string: "postgresql://{{ .username }}:{{ .password }}@postgresql-products.shopping-cart-data.svc.cluster.local:5432/products"

  data:
    - secretKey: username
      remoteRef:
        key: secret/data/postgres/products
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/postgres/products
        property: password
