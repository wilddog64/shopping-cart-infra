---
# ExternalSecret for PostgreSQL products database
# Syncs static database credentials from Vault KV (secret/data/postgres/products)
# ACG sandbox: single static KV path — no role separation; both app and readwrite
# ExternalSecrets intentionally reference the same path (see note on postgres-products-readwrite below)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-products-app
  namespace: shopping-cart-data
  labels:
    app.kubernetes.io/name: external-secret
    app.kubernetes.io/instance: postgres-products-app
    app.kubernetes.io/component: database-credentials
    app.kubernetes.io/part-of: shopping-cart
spec:
  # Static KV credentials do not expire; 24h is sufficient
  refreshInterval: 24h

  # Reference to the ClusterSecretStore
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore

  # Target Kubernetes Secret to create/update (static creds — no TTL-driven rotation)
  target:
    name: postgres-products-app
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: postgres-credentials
          app.kubernetes.io/instance: products
          app.kubernetes.io/component: database-credentials
      data:
        # Database connection details
        username: "{{ .username }}"
        password: "{{ .password }}"
        database: "products"
        host: "postgresql-products.shopping-cart-data.svc.cluster.local"
        port: "5432"
        # Connection string for applications
        connection-string: "postgresql://{{ .username }}:{{ .password }}@postgresql-products.shopping-cart-data.svc.cluster.local:5432/products"

  # Data fetched from static Vault KV (secret/data/postgres/products)
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/postgres/products
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/postgres/products
        property: password

---
# ExternalSecret for read-write access (for product-catalog service)
# ACG sandbox note: references the same Vault KV path as postgres-products-app above.
# The ACG sandbox provisions a single static credential set per DB (no DB engine / role separation).
# Production would use distinct Vault DB roles; in this sandbox both secrets are identical by design.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-products-readwrite
  namespace: shopping-cart-data
  labels:
    app.kubernetes.io/name: external-secret
    app.kubernetes.io/instance: postgres-products-readwrite
    app.kubernetes.io/component: database-credentials
    app.kubernetes.io/part-of: shopping-cart
spec:
  # Static KV credentials do not expire; 24h is sufficient
  refreshInterval: 24h

  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore

  target:
    name: postgres-products-readwrite
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: postgres-credentials
          app.kubernetes.io/instance: products-readwrite
          app.kubernetes.io/component: database-credentials
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
        database: "products"
        host: "postgresql-products.shopping-cart-data.svc.cluster.local"
        port: "5432"
        connection-string: "postgresql://{{ .username }}:{{ .password }}@postgresql-products.shopping-cart-data.svc.cluster.local:5432/products"

  data:
    - secretKey: username
      remoteRef:
        key: secret/data/postgres/products
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/postgres/products
        property: password
