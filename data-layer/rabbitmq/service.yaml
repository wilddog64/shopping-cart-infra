---
# Headless service for StatefulSet cluster formation
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-headless
  namespace: shopping-cart-data
  labels:
    app: rabbitmq
    component: message-queue
spec:
  clusterIP: None
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
      protocol: TCP
    - name: management
      port: 15672
      targetPort: 15672
      protocol: TCP
    - name: epmd
      port: 4369
      targetPort: 4369
      protocol: TCP
    - name: dist
      port: 25672
      targetPort: 25672
      protocol: TCP
    - name: prometheus
      port: 15692
      targetPort: 15692
      protocol: TCP
  selector:
    app: rabbitmq
  publishNotReadyAddresses: true
---
# LoadBalancer service for external access (AMQP)
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: shopping-cart-data
  labels:
    app: rabbitmq
    component: message-queue
spec:
  type: ClusterIP
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
      protocol: TCP
  selector:
    app: rabbitmq
---
# NodePort service for Management UI (k3s has no cloud LB)
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-management
  namespace: shopping-cart-data
  labels:
    app: rabbitmq
    component: message-queue
spec:
  type: NodePort
  ports:
    - name: management
      port: 15672
      targetPort: 15672
      protocol: TCP
      nodePort: 31672
  selector:
    app: rabbitmq
