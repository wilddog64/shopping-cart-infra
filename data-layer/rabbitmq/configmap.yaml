apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq-config
  namespace: shopping-cart-data
  labels:
    app: rabbitmq
    component: message-queue
data:
  enabled_plugins: |
    [rabbitmq_management,rabbitmq_peer_discovery_k8s].

  rabbitmq.conf: |
    # Clustering configuration
    cluster_formation.peer_discovery_backend = kubernetes
    cluster_formation.k8s.host = kubernetes.default.svc.cluster.local
    cluster_formation.k8s.address_type = hostname
    cluster_formation.k8s.service_name = rabbitmq-headless
    cluster_formation.k8s.hostname_suffix = .rabbitmq-headless.shopping-cart-data.svc.cluster.local

    # Cluster partition handling
    cluster_partition_handling = autoheal

    # Queue master locator
    queue_master_locator = min-masters

    # Networking
    listeners.tcp.default = 5672
    management.tcp.port = 15672

    # Memory and disk thresholds
    vm_memory_high_watermark.relative = 0.6
    disk_free_limit.absolute = 2GB

    # Default user (will be overridden by Vault in Stage 2)
    default_user = guest
    default_pass = guest
    default_user_tags.administrator = true

    # Virtual hosts
    default_vhost = /

    # Logging
    log.console = true
    log.console.level = info

    # Message persistence
    queue_index_embed_msgs_below = 4096
