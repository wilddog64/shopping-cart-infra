---
apiVersion: v1
kind: Service
metadata:
  name: redis-orders-cache
  namespace: shopping-cart-data
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/instance: orders-cache
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: shopping-cart
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: redis
    port: 6379
    targetPort: redis
    protocol: TCP
  selector:
    app.kubernetes.io/name: redis
    app.kubernetes.io/instance: orders-cache
