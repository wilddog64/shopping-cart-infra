---
# Admin password secret for PostgreSQL Orders
# This is the postgres superuser password for database initialization
# In production, store this in Vault and sync via ExternalSecret
apiVersion: v1
kind: Secret
metadata:
  name: postgres-orders-admin
  namespace: shopping-cart-data
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/instance: orders
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: shopping-cart
type: Opaque
stringData:
  password: "changeme456"  # Change this in production!

---
# NOTE: Application-level database credentials should be generated
# dynamically by Vault using the database secrets engine.
# See data-layer/secrets/postgres-orders-secret.yaml for ExternalSecret configuration.
