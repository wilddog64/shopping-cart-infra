---
apiVersion: v1
kind: Service
metadata:
  name: postgresql-payment
  namespace: shopping-cart-data
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/instance: payment
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: shopping-cart
    pci-scope: "true"
spec:
  type: ClusterIP
  ports:
  - name: postgresql
    port: 5432
    targetPort: 5432
    protocol: TCP
  selector:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/instance: payment
