name: Build, Scan, Push, Deploy

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
      image-name:
        required: true
        type: string
    secrets:
      PACKAGES_TOKEN:
        required: false

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ inputs.image-name }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            GH_TOKEN=${{ secrets.PACKAGES_TOKEN }}

      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@0.30.0
        continue-on-error: true
        with:
          image-ref: ${{ inputs.image-name }}:sha-${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 0
          ignore-unfixed: true
          format: table

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ inputs.image-name }}:sha-${{ github.sha }}
            ${{ inputs.image-name }}:latest
          cache-from: type=gha
          secrets: |
            GH_TOKEN=${{ secrets.PACKAGES_TOKEN }}

      - name: Update image tag in k8s/base/kustomization.yaml
        continue-on-error: true
        run: |
          sed -i "s|newTag:.*|newTag: sha-${{ github.sha }}|" k8s/base/kustomization.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/base/kustomization.yaml
          git diff --cached --quiet || git commit -m "ci: update ${{ inputs.service-name }} to sha-${{ github.sha }}"
          git pull --rebase origin main && git push
