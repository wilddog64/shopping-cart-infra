name: Validate Manifests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  yamllint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .
          config_data: |
            extends: default
            rules:
              line-length:
                max: 200
              truthy:
                allowed-values: ["true", "false", "on", "off", "yes", "no"]
              comments:
                min-spaces-from-content: 1
              document-start: disable
              indentation:
                spaces: 2
                indent-sequences: false
                check-multi-line-strings: false

  kubeconform:
    name: Kubeconform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar -xz kubeconform
          sudo mv kubeconform /usr/local/bin/kubeconform

      - name: Validate manifests
        run: |
          find . -name "*.yaml" -o -name "*.yml" \
            | grep -v ".github/" \
            | grep -v "kustomization.yaml" \
            | xargs kubeconform \
              -strict \
              -ignore-missing-schemas \
              -kubernetes-version 1.34.0 \
              -summary

  kustomize-build:
    name: Kustomize Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize
        run: |
          curl -sSL https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz \
            | tar -xz kustomize
          sudo mv kustomize /usr/local/bin/kustomize

      - name: Build kustomize overlays
        run: |
          find . -name "kustomization.yaml" \
            | grep -v ".github/" \
            | while read f; do
                dir=$(dirname "$f")
                echo "Building: $dir"
                kustomize build "$dir" > /dev/null
              done
