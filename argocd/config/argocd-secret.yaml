---
# ArgoCD Secret for OIDC Client Secret
# This patches the existing argocd-secret
apiVersion: v1
kind: Secret
metadata:
  name: argocd-secret
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-secret
    app.kubernetes.io/part-of: argocd
type: Opaque
stringData:
  # OIDC client secret from Keycloak
  oidc.keycloak.clientSecret: argocd-oidc-secret-changeme
