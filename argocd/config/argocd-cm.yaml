---
# ArgoCD ConfigMap for OIDC/SSO Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  # Application URL
  url: https://argocd.shopping-cart.local

  # OIDC Configuration with Keycloak
  oidc.config: |
    name: Keycloak
    issuer: http://keycloak.identity.svc.cluster.local/realms/shopping-cart
    clientID: argocd
    clientSecret: $oidc.keycloak.clientSecret
    requestedScopes:
      - openid
      - profile
      - email
      - groups
    # Map Keycloak groups to ArgoCD
    requestedIDTokenClaims:
      groups:
        essential: true

  # Dex is disabled when using OIDC directly
  dex.config: ""

  # Admin user settings
  admin.enabled: "true"

  # Application settings
  application.instanceLabelKey: argocd.argoproj.io/instance

  # Resource tracking
  resource.customizations.health.external-secrets.io_ExternalSecret: |
    hs = {}
    if obj.status ~= nil then
      for _, condition in ipairs(obj.status.conditions or {}) do
        if condition.type == "Ready" then
          if condition.status == "True" then
            hs.status = "Healthy"
            hs.message = condition.message or ""
          else
            hs.status = "Degraded"
            hs.message = condition.message or ""
          end
          return hs
        end
      end
    end
    hs.status = "Progressing"
    hs.message = "Waiting for ExternalSecret to sync"
    return hs

  resource.customizations.health.argoproj.io_Application: |
    hs = {}
    hs.status = "Healthy"
    hs.message = ""
    if obj.status ~= nil then
      if obj.status.health ~= nil then
        hs.status = obj.status.health.status
        if obj.status.health.message ~= nil then
          hs.message = obj.status.health.message
        end
      end
    end
    return hs
