---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: product-catalog
  namespace: cicd
  labels:
    app.kubernetes.io/name: product-catalog
    app.kubernetes.io/part-of: shopping-cart
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: shopping-cart

  source:
    # Update this to your actual Git repository URL
    repoURL: https://github.com/wilddog64/shopping-cart-product-catalog.git
    targetRevision: HEAD
    path: k8s/base

    kustomize:
      patches:
        - patch: |-
            - op: replace
              path: /spec/replicas
              value: 1
          target:
            kind: Deployment
        - patch: |-
            - op: add
              path: /spec/template/spec/imagePullSecrets
              value:
                - name: ghcr-pull-secret
          target:
            kind: Deployment
        - patch: |-
            - op: add
              path: /data/SPRING_JPA_HIBERNATE_DDL_AUTO
              value: create
          target:
            kind: ConfigMap
            name: product-catalog-config

  destination:
    name: ubuntu-k3s
    namespace: shopping-cart-apps

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # Health checks
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas  # Ignore HPA-managed replicas

  info:
    - name: Description
      value: Product Catalog Service - manages product inventory
    - name: Team
      value: shopping-cart-team
    - name: Tier
      value: backend
