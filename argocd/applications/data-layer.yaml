---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: data-layer
  namespace: cicd
  labels:
    app.kubernetes.io/name: data-layer
    app.kubernetes.io/part-of: shopping-cart
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: shopping-cart

  source:
    repoURL: https://github.com/wilddog64/shopping-cart-infra.git
    targetRevision: HEAD
    path: data-layer
    directory:
      recurse: true

  destination:
    name: ubuntu-k3s
    namespace: shopping-cart-data

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  info:
    - name: Description
      value: Data layer — PostgreSQL, RabbitMQ, Redis
    - name: Team
      value: shopping-cart-team
    - name: Tier
      value: data
