---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: payment-service
  namespace: cicd
  labels:
    app.kubernetes.io/name: payment-service
    app.kubernetes.io/part-of: shopping-cart
    pci-scope: "true"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: shopping-cart

  source:
    # Update this to your actual Git repository URL
    repoURL: https://github.com/wilddog64/shopping-cart-payment.git
    targetRevision: HEAD
    path: k8s/base

    kustomize:
      patches:
        - patch: |-
            - op: replace
              path: /spec/replicas
              value: 1
          target:
            kind: Deployment

  destination:
    server: https://10.211.55.14:6443
    namespace: shopping-cart-payment

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # Health checks
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas  # Ignore HPA-managed replicas

  info:
    - name: Description
      value: Payment Service - PCI DSS compliant payment processing
    - name: Team
      value: shopping-cart-team
    - name: Tier
      value: payment
    - name: PCI Scope
      value: "true"
