---
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-config
  namespace: identity
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: identity-provider
data:
  # Keycloak configuration
  KC_DB: postgres
  KC_DB_URL_HOST: postgres-keycloak.identity.svc.cluster.local
  KC_DB_URL_PORT: "5432"
  KC_DB_URL_DATABASE: keycloak
  KC_HOSTNAME_STRICT: "false"
  KC_PROXY: edge
  KC_HTTP_ENABLED: "true"
  KC_HEALTH_ENABLED: "true"
  KC_METRICS_ENABLED: "true"

  # Realm configuration
  KC_REALM: shopping-cart

  # LDAP Configuration
  LDAP_CONNECTION_URL: ldap://ldap.identity.svc.cluster.local:389
  LDAP_USERS_DN: ou=users,dc=shopping-cart,dc=local
  LDAP_BIND_DN: cn=admin,dc=shopping-cart,dc=local
  LDAP_USER_OBJECT_CLASSES: inetOrgPerson,organizationalPerson
  LDAP_UUID_ATTRIBUTE: entryUUID
  LDAP_USERNAME_ATTRIBUTE: uid
  LDAP_RDN_ATTRIBUTE: uid
  LDAP_FULL_SYNC_PERIOD: "604800"
  LDAP_CHANGED_SYNC_PERIOD: "86400"
