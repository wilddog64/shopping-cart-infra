---
# WARNING: For development only. Use Vault or external-secrets in production.
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-secrets
  namespace: identity
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: identity-provider
type: Opaque
stringData:
  # Keycloak admin credentials
  KEYCLOAK_ADMIN: admin
  KEYCLOAK_ADMIN_PASSWORD: CHANGE_ME

  # Database credentials
  KC_DB_USERNAME: keycloak
  KC_DB_PASSWORD: CHANGE_ME

  # LDAP bind password
  LDAP_BIND_CREDENTIAL: CHANGE_ME
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-client-secrets
  namespace: identity
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: identity-provider
type: Opaque
stringData:
  # OIDC client secrets for applications
  argocd-client-secret: CHANGE_ME
  order-service-client-secret: CHANGE_ME
  product-catalog-client-secret: CHANGE_ME
  grafana-client-secret: CHANGE_ME
