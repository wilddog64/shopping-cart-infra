---
# WARNING: For development only. Use Vault or external-secrets in production.
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-secrets
  namespace: identity
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: identity-provider
type: Opaque
stringData:
  # Keycloak admin credentials
  KEYCLOAK_ADMIN: admin
  KEYCLOAK_ADMIN_PASSWORD: changeme

  # Database credentials
  KC_DB_USERNAME: keycloak
  KC_DB_PASSWORD: changeme

  # LDAP bind password
  LDAP_BIND_CREDENTIAL: changeme
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-client-secrets
  namespace: identity
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: identity-provider
type: Opaque
stringData:
  # OIDC client secrets for applications
  argocd-client-secret: argocd-oidc-secret-changeme
  order-service-client-secret: order-svc-oidc-secret-changeme
  product-catalog-client-secret: product-cat-oidc-secret-changeme
  grafana-client-secret: grafana-oidc-secret-changeme
