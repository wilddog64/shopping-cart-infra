# GitHub Actions Workflow for Building and Pushing Container Images
# Copy this file to .github/workflows/ in your service repository

name: Build and Push Container Image

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
      - '!.github/workflows/**'
  pull_request:
    branches:
      - main
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  # IMAGE_NAME will be: owner/repository-name (e.g., username/product-catalog)
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Lint and security scan (runs on PRs)
  lint:
    name: Lint and Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Hadolint (Dockerfile linter)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # Build and push image
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    # Run on main/develop push or releases (not PRs)
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Git short SHA (e.g., main-a1b2c3d or develop-a1b2c3d)
            type=sha,prefix={{branch}}-,format=short
            # Branch name (e.g., main, develop)
            type=ref,event=branch
            # Semantic version on release (e.g., v1.2.3, v1.2, v1)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # Latest tag for main branch only
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
          subject-digest: ${{ steps.build-and-push.outputs.digest }}
          push-to-registry: true

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Trigger Jenkins Pipeline
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          # Extract service name from repository (e.g., owner/product-catalog -> product-catalog)
          SERVICE_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)

          # Extract image tag (e.g., main-a1b2c3d)
          IMAGE_TAG=$(echo "${{ steps.meta.outputs.tags }}" | grep -m1 'main-' | cut -d':' -f2)

          # Trigger Jenkins webhook
          curl -X POST ${{ secrets.JENKINS_WEBHOOK_URL }} \
            -H "Authorization: Bearer ${{ secrets.JENKINS_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "service": "'"${SERVICE_NAME}"'",
              "image_tag": "'"${IMAGE_TAG}"'",
              "git_sha": "${{ github.sha }}",
              "git_ref": "${{ github.ref }}",
              "git_author": "${{ github.actor }}",
              "commit_message": "${{ github.event.head_commit.message }}"
            }'

      - name: Create deployment summary
        run: |
          echo "## Deployment Information" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build-and-push.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**View package:** https://github.com/${{ github.repository_owner }}?tab=packages" >> $GITHUB_STEP_SUMMARY

  # Test the built image
  test-image:
    name: Test Container Image
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and test image
        run: |
          # Pull the image
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-${GITHUB_SHA::7}"
          echo "Testing image: ${IMAGE}"

          docker pull "${IMAGE}"

          # Run container
          CONTAINER_ID=$(docker run -d -p 8080:8080 "${IMAGE}")
          echo "Container started: ${CONTAINER_ID}"

          # Wait for container to be ready
          sleep 10

          # Test health endpoint (adjust port/path based on your service)
          if curl -f http://localhost:8080/health || curl -f http://localhost:8080/; then
            echo "Health check passed"
          else
            echo "Health check failed"
            docker logs "${CONTAINER_ID}"
            exit 1
          fi

          # Cleanup
          docker stop "${CONTAINER_ID}"
          docker rm "${CONTAINER_ID}"
